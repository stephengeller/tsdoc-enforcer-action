name: "TSDoc Enforcer"
description: "Fails PRs that add exported TypeScript symbols without TSDoc, and posts AI-generated doc blocks ready to paste."
author: "stephengeller"
branding:
  icon: "book-open"
  color: "purple"

# No inputs, no secrets — opinionated defaults only.
# Consumer workflow must grant:
#   permissions.models: read        (GitHub Models inference for TSDoc generation)
#   permissions.pull-requests: write (to post/update the PR comment)
#   permissions.contents: read      (to fetch changed files)
# GITHUB_TOKEN is provided automatically by GitHub.

runs:
  using: "node20"
  main: "dist/index.js"
