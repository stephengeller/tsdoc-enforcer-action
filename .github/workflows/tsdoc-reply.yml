name: TSDoc Enforcer (reply-to-apply)

on:
  pull_request_review_comment:
    types: [created]

# Serialize per-thread (parent review comment) rather than per-PR — GitHub
# only keeps one waiting run per concurrency group, so a per-PR key silently
# drops middle replies when 3+ arrive in quick succession. Cross-thread
# commits to the same file can still 409 on blob-SHA mismatch; the reply
# action retries on that (see commitWithRetry in src/suggest/reply.ts).
# Note: github.event.comment.in_reply_to_id is a GitHub-assigned numeric id
# used only as a group key (not interpolated into any shell command), so the
# standard workflow-injection risks for comment fields don't apply here.
concurrency:
  group: tsdoc-reply-${{ github.event.comment.in_reply_to_id }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Apply reply as TSDoc commit
        uses: ./reply
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
