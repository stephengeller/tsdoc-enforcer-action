name: TSDoc Enforcer (reply-to-apply)

on:
  pull_request_review_comment:
    types: [created]

# Serialize per-PR so back-to-back replies can't race on the branch tip —
# the commit API rejects on blob-SHA mismatch, so two parallel splices
# would fight and the loser would fail with a 409.
concurrency:
  group: tsdoc-reply-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Apply reply as TSDoc commit
        uses: ./reply
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
