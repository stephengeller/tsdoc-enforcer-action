name: TSDoc Enforcer (self-dogfood)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  tsdoc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      models: read
    steps:
      - uses: actions/checkout@v4
      - uses: stephengeller/tsdoc-enforcer-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}