name: "TSDoc Enforcer (Report)"
description: "Fails PRs that add TypeScript symbols without TSDoc. Posts a PR comment listing missing docs with a paste-ready AI prompt."
author: "stephengeller"
branding:
  icon: "book-open"
  color: "gray-dark"

# No inputs, no secrets, no AI inference.
# Consumer workflow must grant:
#   permissions.pull-requests: write (to post/update the PR comment)
#   permissions.contents: read      (to fetch changed files)
# GITHUB_TOKEN is provided automatically by GitHub.

runs:
  using: "node20"
  main: "dist/index.js"
